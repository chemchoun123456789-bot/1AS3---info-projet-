<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>حقوق المشروع - ثانوية ملايكة طيب</title>
    <style>
      /* إعدادات الخطوط والخلفية */
      body {
        margin: 0;
        padding: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(
          135deg,
          #1a1a2e 0%,
          #16213e 50%,
          #0f3460 100%
        );
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
        overflow: hidden;
      }

      /* تصميم البطاقة الزجاجية */
      .credit-card {
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 50px;
        border-radius: 30px;
        text-align: center;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        max-width: 500px;
        width: 90%;
        animation: fadeIn 1.5s ease-out;
      }

      /* تأثير الحركة عند الدخول */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      h1 {
        font-size: 2.5rem;
        margin-bottom: 30px;
        background: linear-gradient(to right, #ffd700, #fff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        border-bottom: 2px solid rgba(255, 215, 0, 0.3);
        display: inline-block;
        padding-bottom: 10px;
      }

      .info-box {
        margin: 20px 0;
      }

      .label {
        font-size: 0.9rem;
        color: #aaa;
        text-transform: uppercase;
        letter-spacing: 2px;
        display: block;
        margin-bottom: 5px;
      }

      .name {
        font-size: 1.8rem;
        font-weight: bold;
        color: #fff;
        display: block;
      }

      .class-tag {
        background: gold;
        color: #000;
        padding: 2px 10px;
        border-radius: 5px;
        font-size: 1rem;
        font-weight: bold;
        margin-right: 10px;
        vertical-align: middle;
      }

      .supervisor {
        font-size: 1.3rem;
        color: #e0e0e0;
        margin-top: 10px;
        display: block;
      }

      /* زر العودة */
      .back-btn {
        margin-top: 40px;
        background: transparent;
        border: 1px solid gold;
        color: gold;
        padding: 10px 25px;
        border-radius: 50px;
        cursor: pointer;
        transition: 0.3s;
        text-decoration: none;
        display: inline-block;
        font-size: 0.9rem;
      }

      .back-btn:hover {
        background: gold;
        color: #000;
        box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      }

      /* ---------------- MECHA BUTTON ---------------- */
      .post888-mecha {
        display: inline-block;
        font-family: system-ui, sans-serif;
        margin-top: 40px;
      }
      .post888-mecha__toggle {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }
      .post888-mecha__frame {
        position: relative;
        display: inline-block;
        padding: 24px 28px 26px 28px;
        border-radius: 18px;
        background: linear-gradient(180deg, #0a0e19, #05060a);
        box-shadow:
          0 12px 32px rgba(0, 0, 0, 0.65),
          inset 0 0 0 1px rgba(125, 249, 255, 0.08);
        cursor: pointer;
        user-select: none;
      }
      .post888-mecha__button {
        position: relative;
        width: 210px;
        height: 64px;
        border-radius: 14px;
        background: linear-gradient(180deg, #1b2134, #0e1324);
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.06),
          inset 0 -8px 14px rgba(0, 0, 0, 0.9),
          0 10px 0 #03040a,
          0 18px 26px rgba(0, 0, 0, 0.7);
        transform: translateY(0);
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease,
          filter 0.18s ease;
      }
      .post888-mecha__button-face {
        position: absolute;
        inset: 6px;
        border-radius: 10px;
        background:
          radial-gradient(
            120px circle at 20% 20%,
            rgba(125, 249, 255, 0.18),
            transparent 50%
          ),
          linear-gradient(180deg, #11162b, #0a0f1f);
        box-shadow:
          inset 0 0 0 1px rgba(125, 249, 255, 0.18),
          inset 0 0 18px rgba(88, 199, 255, 0.12);
        display: grid;
        place-items: center;
        overflow: hidden;
      }
      .post888-mecha__text {
        position: absolute;
        font-weight: 700;
        letter-spacing: 0.22em;
        font-size: 0.9rem;
        text-transform: uppercase;
        transition:
          opacity 0.2s ease,
          transform 0.2s ease;
      }
      .post888-mecha__text--off {
        opacity: 1;
        transform: translateY(0);
        color: #dbeafe;
        text-shadow: 0 0 10px rgba(125, 249, 255, 0.35);
      }
      .post888-mecha__text--on {
        opacity: 0;
        transform: translateY(8px);
        color: #a7f3d0;
        text-shadow: 0 0 12px rgba(34, 197, 94, 0.55);
      }
      .post888-mecha__frame:hover .post888-mecha__button {
        filter: brightness(1.05);
      }
      .post888-mecha__arm {
        position: absolute;
        left: -3px;
        top: -2px;
        width: 140px;
        height: 110px;
        transform-origin: 24px 24px;
        transform: rotate(-17deg);
        transition: transform 0.35s ease;
        pointer-events: none;
      }
      .post888-mecha__arm-base {
        position: absolute;
        left: 10px;
        top: 14px;
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: linear-gradient(180deg, #1d2438, #0b1020);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.06),
          0 6px 12px rgba(0, 0, 0, 0.6);
      }
      .post888-mecha__arm-joint {
        position: absolute;
        left: 36px;
        top: 28px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: radial-gradient(circle, #9fb3d9, #1b243b);
        box-shadow: 0 0 8px rgba(125, 249, 255, 0.25);
      }
      .post888-mecha__arm-fore {
        position: absolute;
        left: 44px;
        top: 32px;
        width: 62px;
        height: 12px;
        border-radius: 999px;
        background: linear-gradient(90deg, #232b44, #0f162b);
        box-shadow:
          inset 0 0 0 1px rgba(125, 249, 255, 0.12),
          0 4px 8px rgba(0, 0, 0, 0.6);
      }
      .post888-mecha__claw {
        position: absolute;
        left: 96px;
        top: 20px;
        width: 34px;
        height: 34px;
        transform-origin: 0 50%;
        transition: transform 0.25s ease;
      }
      .post888-mecha__claw-finger {
        position: absolute;
        width: 28px;
        height: 8px;
        border-radius: 999px;
        background: linear-gradient(180deg, #2a3552, #10172c);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        transform-origin: 2px 50%;
        transition: transform 0.25s ease;
      }
      .post888-mecha__claw-finger--top {
        top: 5px;
        transform: rotate(22deg);
      }
      .post888-mecha__claw-finger--bottom {
        bottom: 4px;
        transform: rotate(-20deg);
      }
      .post888-mecha__led {
        position: absolute;
        right: 14px;
        top: 12px;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: radial-gradient(circle, #334155, #0b1020);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
        transition:
          background 0.2s ease,
          box-shadow 0.2s ease;
      }
      .post888-mecha__frame:hover .post888-mecha__arm {
        transform: rotate(2deg) translateX(6px);
      }
      .post888-mecha__frame:hover .post888-mecha__claw {
        transform: translateX(6px);
      }
      .post888-mecha__frame:hover .post888-mecha__claw-finger--top {
        transform: rotate(6deg);
      }
      .post888-mecha__frame:hover .post888-mecha__claw-finger--bottom {
        transform: rotate(-6deg);
      }
      .post888-mecha__toggle:checked
        + .post888-mecha__frame
        .post888-mecha__arm {
        transform: rotate(10deg) translateX(12px) translateY(6px);
      }
      .post888-mecha__toggle:checked
        + .post888-mecha__frame
        .post888-mecha__claw-finger--top {
        transform: rotate(34deg);
      }
      .post888-mecha__toggle:checked
        + .post888-mecha__frame
        .post888-mecha__claw-finger--bottom {
        transform: rotate(-34deg);
      }
      .post888-mecha__toggle:checked
        + .post888-mecha__frame
        .post888-mecha__button {
        transform: translateY(6px);
        box-shadow:
          inset 0 2px 0 rgba(255, 255, 255, 0.04),
          inset 0 -6px 10px rgba(0, 0, 0, 0.9),
          0 4px 0 #03040a,
          0 10px 18px rgba(0, 0, 0, 0.8);
      }
      .post888-mecha__toggle:checked
        + .post888-mecha__frame
        .post888-mecha__text--off {
        opacity: 0;
        transform: translateY(-8px);
      }
      .post888-mecha__toggle:checked
        + .post888-mecha__frame
        .post888-mecha__text--on {
        opacity: 1;
        transform: translateY(0);
      }
      .post888-mecha__toggle:checked
        + .post888-mecha__frame
        .post888-mecha__led {
        background: radial-gradient(circle, #86efac, #16a34a);
        box-shadow:
          0 0 8px rgba(34, 197, 94, 0.9),
          0 0 16px rgba(34, 197, 94, 0.55);
      }
      @media (prefers-reduced-motion: reduce) {
        .post888-mecha__button,
        .post888-mecha__arm,
        .post888-mecha__claw,
        .post888-mecha__claw-finger,
        .post888-mecha__text,
        .post888-mecha__led {
          transition: none;
        }
      }

      /* ديكور خلفية (دوائر مضيئة) */
      .circle {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 215, 0, 0.1);
        z-index: -1;
        filter: blur(50px);
      }

      /* ---- صفحة التحميل ---- */
      #loading-screen {
        position: fixed;
        inset: 0;
        background: radial-gradient(
          ellipse at center,
          #0d1117 0%,
          #020408 100%
        );
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        z-index: 9999;
      }
      #loading-screen.active {
        display: flex;
      }
      .loading-progress-wrap {
        width: 220px;
        height: 4px;
        background: rgba(255, 255, 255, 0.08);
        border-radius: 999px;
        overflow: hidden;
      }
      .loading-progress-bar {
        height: 100%;
        width: 0%;
        border-radius: 999px;
        background: linear-gradient(90deg, #22d3ee, #a855f7);
        box-shadow: 0 0 10px rgba(34, 211, 238, 0.6);
        transition: width 0.1s linear;
      }
      .loading-text {
        font-family: "Cairo", sans-serif;
        font-size: 1.1rem;
        font-weight: 600;
        color: rgba(255, 255, 255, 0.7);
        letter-spacing: 2px;
        text-shadow: 0 0 10px rgba(34, 211, 238, 0.3);
      }
      .loader * {
        box-sizing: border-box;
      }
      .loader {
        position: relative;
        width: 150px;
        height: 150px;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        border-radius: 50%;
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.1),
          0 0 20px rgba(0, 0, 0, 1);
      }
      .ring {
        position: absolute;
        border-radius: 50%;
        box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(2px);
        transform-style: preserve-3d;
      }
      .ring::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.1);
        z-index: 1;
      }
      .outer {
        width: 140px;
        height: 140px;
        z-index: 10;
        animation: spin 12s linear infinite;
      }
      .outer::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 1px solid transparent;
        border-top-color: rgba(34, 211, 238, 0.8);
        border-right-color: rgba(34, 211, 238, 0.2);
        box-shadow: 0 0 15px rgba(34, 211, 238, 0.4);
        z-index: 2;
        pointer-events: none;
      }
      .middle {
        width: 100px;
        height: 100px;
        z-index: 20;
        animation: spin 8s linear infinite reverse;
      }
      .middle::after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 1px solid transparent;
        border-left-color: rgba(168, 85, 247, 0.8);
        border-bottom-color: rgba(168, 85, 247, 0.2);
        box-shadow: 0 0 15px rgba(168, 85, 247, 0.4);
        z-index: 2;
        pointer-events: none;
      }
      .inner {
        width: 60px;
        height: 60px;
        z-index: 30;
        animation: spin 4s linear infinite;
        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.05) 0%,
          transparent 60%
        );
      }
      .inner::before {
        border: 1px dashed rgba(255, 255, 255, 0.3);
      }
      .item {
        position: absolute;
        top: 50%;
        left: 50%;
        transform-origin: 0 0;
        z-index: 5;
      }
      .symbol {
        display: block;
        color: #fff;
        font-size: 1.2rem;
        font-weight: 400;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
      }
      .outer .item-1 {
        transform: rotate(0deg) translate(0, -70px);
      }
      .outer .item-2 {
        transform: rotate(120deg) translate(0, -70px);
      }
      .outer .item-3 {
        transform: rotate(240deg) translate(0, -70px);
      }
      .middle .item-1 {
        transform: rotate(0deg) translate(0, -50px);
      }
      .middle .item-2 {
        transform: rotate(180deg) translate(0, -50px);
      }
      .inner .item-1 {
        transform: rotate(90deg) translate(0, -30px);
      }
      .inner .item-2 {
        transform: rotate(270deg) translate(0, -30px);
      }
      @keyframes spin-reverse-0 {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(-360deg);
        }
      }
      @keyframes spin-reverse-120 {
        from {
          transform: rotate(-120deg);
        }
        to {
          transform: rotate(-480deg);
        }
      }
      @keyframes spin-reverse-240 {
        from {
          transform: rotate(-240deg);
        }
        to {
          transform: rotate(-600deg);
        }
      }
      .outer .item-1 .symbol {
        animation: spin-reverse-0 12s linear infinite;
      }
      .outer .item-2 .symbol {
        animation: spin-reverse-120 12s linear infinite;
      }
      .outer .item-3 .symbol {
        animation: spin-reverse-240 12s linear infinite;
      }
      @keyframes spin-forward-0 {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes spin-forward-180 {
        from {
          transform: rotate(-180deg);
        }
        to {
          transform: rotate(180deg);
        }
      }
      .middle .item-1 .symbol {
        animation: spin-forward-0 8s linear infinite;
      }
      .middle .item-2 .symbol {
        animation: spin-forward-180 8s linear infinite;
      }
      @keyframes spin-reverse-90 {
        from {
          transform: rotate(-90deg);
        }
        to {
          transform: rotate(-450deg);
        }
      }
      @keyframes spin-reverse-270 {
        from {
          transform: rotate(-270deg);
        }
        to {
          transform: rotate(-630deg);
        }
      }
      .inner .item-1 .symbol {
        animation: spin-reverse-90 4s linear infinite;
      }
      .inner .item-2 .symbol {
        animation: spin-reverse-270 4s linear infinite;
      }
      .core {
        position: absolute;
        width: 8px;
        height: 8px;
        background: #fff;
        border-radius: 50%;
        box-shadow:
          0 0 5px #fff,
          0 0 15px #22d3ee,
          0 0 30px #a855f7;
        z-index: 10;
        animation: heartbeat-core 4s ease-in-out infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes heartbeat-core {
        0% {
          transform: scale(1);
          opacity: 0.8;
        }
        15% {
          transform: scale(1.4);
          opacity: 1;
          box-shadow:
            0 0 10px #fff,
            0 0 25px #22d3ee;
        }
        20% {
          transform: scale(1);
          opacity: 0.8;
        }
        40% {
          transform: scale(1.4);
          opacity: 1;
          box-shadow:
            0 0 10px #fff,
            0 0 25px #22d3ee;
        }
        45% {
          transform: scale(1);
          opacity: 0.8;
        }
        65% {
          transform: scale(1.4);
          opacity: 1;
          box-shadow:
            0 0 10px #fff,
            0 0 25px #22d3ee;
        }
        70% {
          transform: scale(1);
          opacity: 0.8;
        }
        86% {
          transform: scale(1.7);
          opacity: 1;
          box-shadow:
            0 0 15px #fff,
            0 0 40px #a855f7;
        }
        90% {
          transform: scale(1);
          opacity: 0.8;
        }
        100% {
          transform: scale(1);
          opacity: 0.8;
        }
      }
    </style>
  </head>
  <body>
    <!-- صفحة التحميل -->
    <div id="loading-screen">
      <div class="loading-progress-wrap">
        <div class="loading-progress-bar" id="progressBar"></div>
      </div>
      <div class="loader">
        <div class="ring outer">
          <div class="item item-1"><span class="symbol">∫</span></div>
          <div class="item item-2"><span class="symbol">∑</span></div>
          <div class="item item-3"><span class="symbol">∂</span></div>
        </div>
        <div class="ring middle">
          <div class="item item-1"><span class="symbol">π</span></div>
          <div class="item item-2"><span class="symbol">e</span></div>
        </div>
        <div class="ring inner">
          <div class="item item-1"><span class="symbol">∞</span></div>
          <div class="item item-2"><span class="symbol">√</span></div>
        </div>
        <div class="core"></div>
      </div>
      <div class="loading-text">جاري تحميل ...</div>
    </div>
    <div
      class="circle"
      style="width: 300px; height: 300px; top: -50px; left: -50px"
    ></div>
    <div
      class="circle"
      style="
        width: 200px;
        height: 200px;
        bottom: 50px;
        right: -50px;
        background: rgba(0, 150, 255, 0.1);
      "
    ></div>

    <div class="credit-card">
      <h1>تفاصيل المشروع</h1>

      <div class="info-box">
        <span class="label">صاحب المشروع</span>
        <span class="name"
          >فراح محمد أمين <span class="class-tag">1ع3</span></span
        >
      </div>

      <div class="info-box" style="margin-top: 40px">
        <span class="label">تحت إشراف الأستاذة</span>
        <span class="supervisor">بن طوز فاطمة</span>
        <small style="color: gold; opacity: 0.8">مادة الإعلام الآلي</small>
      </div>

      <div class="post888-mecha">
        <input
          id="post888-toggle"
          class="post888-mecha__toggle"
          type="checkbox"
        />
        <label
          class="post888-mecha__frame"
          for="post888-toggle"
          aria-label="العودة"
          onclick="startLoading()"
        >
          <div class="post888-mecha__arm">
            <div class="post888-mecha__arm-base"></div>
            <div class="post888-mecha__arm-joint"></div>
            <div class="post888-mecha__arm-fore"></div>
            <div class="post888-mecha__claw">
              <div
                class="post888-mecha__claw-finger post888-mecha__claw-finger--top"
              ></div>
              <div
                class="post888-mecha__claw-finger post888-mecha__claw-finger--bottom"
              ></div>
            </div>
          </div>
          <div class="post888-mecha__button">
            <div class="post888-mecha__button-face">
              <span class="post888-mecha__text post888-mecha__text--on"
                >GOING BACK ...</span
              >
              <span class="post888-mecha__text post888-mecha__text--off"
                >GO BACK TO ORIGIN PAGE</span
              >
            </div>
          </div>
          <div class="post888-mecha__led"></div>
        </label>
      </div>
    </div>
    <script>
      function startLoading() {
        const screen = document.getElementById("loading-screen");
        const bar = document.getElementById("progressBar");
        screen.classList.add("active");
        let progress = 0;
        const duration = 5000;
        const interval = 50;
        const step = (interval / duration) * 100;
        const timer = setInterval(() => {
          progress = Math.min(progress + step, 100);
          bar.style.width = progress + "%";
          if (progress >= 100) {
            clearInterval(timer);
            setTimeout(() => {
              window.location.href = "INFO-PROJET.html";
            }, 200);
          }
        }, interval);
      }
    </script>
  </body>
</html>
